<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{title}} • Braden Roth</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/blog.css" />

    <!-- Basic Open Graph -->
    <meta property="og:title" content="{{title}} • Braden Roth" />
    <meta property="og:image" content="{{metaImage}}" />
    <meta property="og:url" content="https://bradenroth.com/" />
    <meta property="og:type" content="article" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{title}} • Braden Roth" />
    <meta name="twitter:image" content="{{metaImage}}" />
  </head>
  <body
    data-page="blog-post"
    class="bg-white text-stone-800 dark:bg-zinc-950 dark:text-stone-100 dark:selection:bg-primary-500/40"
  >
    <div id="wrapper">
      <main id="main" class="blog">
        <div class="blog-layout">
          <div class="blog-layout__content">
            <div class="blog-header-wrapper">
              <header>
                {{headerImage}}
                <h1>{{title}}</h1>
                <div class="blog-header__meta">
                  <time datetime="{{datetime}}" class="blog-header__date">{{displayDate}}</time>
                  <span class="blog-header__reading-time">{{readingTime}}</span>
                </div>
                <time datetime="{{updatedDatetime}}" class="blog-header__updated">
                  <a href="#blog-updates">Updated {{updatedDate}}</a>
                </time>
                <div class="blog-post__tags">{{tags}}</div>
              </header>
            </div>
            <!-- content will be wrapped in an <article> -->
            {{content}} {{updates}} {{actions}}
          </div>

          <aside class="blog-layout__aside">
            <h2 class="blog-toc__title">Contents</h2>
            <nav class="blog-toc" aria-label="Table of contents" hidden="true">
              <ol class="blog-toc__list">
                {{toc}}
              </ol>
            </nav>
          </aside>
        </div>
      </main>

      <div id="nav"></div>
      <div id="footer"></div>
    </div>
  </body>
</html>
