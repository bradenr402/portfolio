<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blog • Braden Roth</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/blog.css" />

    <!-- Basic Open Graph -->
    <meta property="og:title" content="Blog • Braden Roth" />
    <meta
      property="og:description"
      content="Full-stack developer building useful, meaningful, and delightful web applications."
    />
    <meta property="og:image" content="https://bradenroth.com/images/family.webp" />
    <meta property="og:url" content="https://bradenroth.com/" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Blog • Braden Roth" />
    <meta
      name="twitter:description"
      content="Full-stack developer building useful, meaningful, and delightful web applications."
    />
    <meta name="twitter:image" content="https://bradenroth.com/images/family.webp" />
  </head>
  <body
    data-page="blog-index"
    class="bg-white text-stone-800 dark:bg-zinc-950 dark:text-stone-100 dark:selection:bg-primary-500/40"
  >
    <div id="wrapper">
      <main id="main" class="blog blog--index">
        <div class="blog-layout">
          <div class="blog-layout__content">
            <div class="blog-header-wrapper">
              <header class="blog-index__header">
                <h1>Blog<span class="text-accent">.</span></h1>
                <p>
                  Thoughts, posts, notes, and writings about building software, things I’m
                  learning, and whatever else I’m thinking about. Feel free to send me an
                  <a href="mailto:me@bradenroth.com">email</a> with your thoughts.
                </p>
              </header>
            </div>

            <section>
              <ul class="blog-post-list">
                <div class="blog-post-highlight"></div>
                {{postList}}
              </ul>
            </section>
          </div>
        </div>
      </main>

      <div id="nav"></div>
      <div id="footer"></div>
    </div>
  </body>
</html>
